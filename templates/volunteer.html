<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Volunteer Portal</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='volunteer.css') }}">
</head>
<body>
    <div class="container">
        <section class="form-card">
            <h1>Help the Community</h1>
            <p>Register your skills to support those in need.</p>
            
            <form onsubmit="return false;">
                <div class="input-group">
                    <label>Volunteer Name</label>
                    <input type="text" id="vname" placeholder="Your Name" required>
                </div>

                <div class="input-group">
                    <label>Service Type</label>
                    <select id="vhelptype" required>
                        <option value="" disabled selected>Select what you can provide</option>
                        <option value="Food">Food Distribution</option>
                        <option value="Medicine">Medical Support</option>
                        <option value="Education">Tutoring</option>
                    </select>
                </div>

                <div class="input-group">
                    <label>Contact Number</label>
                    <input type="tel" id="vcontact" pattern="[0-9]{10}" placeholder="10 Digit Number" required>
                </div>

                <div class="input-group">
                    <label>Pincode</label>
                    <input type="text" id="vpincode" pattern="[0-9]{6}" placeholder="6 Digit Pincode" required>
                </div>

                <button type="submit" id="vsubmit" class="btn-submit" onclick="showmatches()">Register Now ✅</button>
            </form>
        </section>

        <div id="result-section" style="display:none; margin-top: 30px; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
            <h3 style="color: #2c3e50; margin-bottom: 15px; border-bottom: 2px solid #3498db; padding-bottom: 5px;">
                People Who Need Your Help (Nearest First)
            </h3>
            <table style="width:100%; border-collapse: collapse; font-family: Arial, sans-serif;">
                <thead>
                    <tr style="background-color: #3498db; color: white;">
                        <th style="padding: 12px; border: 1px solid #ddd;">Name</th>
                        <th style="padding: 12px; border: 1px solid #ddd;">Contact</th>
                        <th style="padding: 12px; border: 1px solid #ddd;">Pincode</th>
                        <th style="padding: 12px; border: 1px solid #ddd;">Distance</th>
                    </tr>
                </thead>
                <tbody id="match-data"></tbody>
            </table>
        </div>
    </div>

    <script>
        async function showmatches() {
            // Prefix detect logic (v for volunteer, u for user)
            const isUser = document.getElementById('uname') !== null;
            const prefix = isUser ? 'u' : 'v';
            
            const nameVal = document.getElementById(prefix + 'name').value;
            const helpVal = document.getElementById(prefix + 'helptype').value;
            const contactVal = document.getElementById(prefix + 'contact').value;
            const pinVal = document.getElementById(prefix + 'pincode').value;

            if(!nameVal || !helpVal || !contactVal || !pinVal) {
                alert("Please fill all details!");
                return;
            }

            const payload = {
                name: nameVal,
                helpType: helpVal,
                contact: contactVal,
                pincode: pinVal,
                role: isUser ? 'User' : 'Volunteer'
            };

            try {
                const response = await fetch('/submit', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const result = await response.json();
                
                if (result.status === "success") {
                    // console log if duplicate detected
                    if (result.message === "already_existed") {
                        console.log("Volunteer already registered. Showing nearby requests.");
                    }

                    const resultDiv = document.getElementById('result-section');
                    const tbody = document.getElementById('match-data');
                    
                    tbody.innerHTML = ""; // Purana data clear karein
                    
                    if (result.matches && result.matches.length > 0) {
                        resultDiv.style.display = "block";
                        result.matches.forEach(match => {
                            let distText = match.distance === 0 ? "Same Area" : match.distance + " units away";
                            tbody.innerHTML += `
                                <tr style="border-bottom: 1px solid #eee;">
                                    <td style="padding:10px;">${match.Name}</td>
                                    <td style="padding:10px;">${match.Contact}</td>
                                    <td style="padding:10px;">${match.PinCode}</td>
                                    <td style="padding:10px; font-weight:bold; color:#27ae60;">${distText}</td>
                                </tr>`;
                        });
                        resultDiv.scrollIntoView({ behavior: 'smooth' });
                    } else {
                        alert("Registration Successful! No immediate help requests in your area right now.");
                    }
                } else {
                    alert("Error: " + result.message);
                }
            } catch (error) {
                console.error("Error:", error);
                alert("Unable to connect to the server. Please check if Python is running.");
            }
        }
    </script>
</body>
</html>
